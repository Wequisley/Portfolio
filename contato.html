<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wequisley Batista - Portfólio</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&display=swap" rel="stylesheet">
  <!-- Google Fonts: Sansita -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Mono&display=swap" rel="stylesheet">
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
  <header>
    <nav>
      <ul class="menuStyle">
        <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>INÍCIO</span></a></li>
        <li><a href="sobre.html"><i class="fa-solid fa-circle-info"></i> <span>SOBRE</span></a></li>
        <li><a href="portfolio.html"><i class="fa-solid fa-briefcase"></i> <span>PORTFÓLIO</span></a></li>
        <li><a href="contato.html"><i class="fa-solid fa-user"></i> <span>CONTATO</span></a></li>
      </ul>
    </nav>
  </header>
  <br><br>

  <section class="contato-section">
    <form id="contatoForm" class="contato-form">
      <label for="nome">Digite seu nome</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">Digite seu e-mail</label>
      <input type="email" id="email" name="email" required>

      <label for="telefone">Digite seu telefone</label>
      <input type="tel" id="telefone" name="telefone">

      <label for="mensagem">Deixe sua mensagem!</label>
      <textarea id="mensagem" name="mensagem" required></textarea>

      <button type="submit" class="contato-btn">ENVIAR</button>
    </form>
  </section>
  <br>

  <section>
    <h1 class="sh102"><span class="sh102color">E-mail:</span> devwequisley@gmail.com</h1>
  </section>

  <!-- Importa o EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init({
      publicKey: "Chlc9ChTPTnsGOfU1"
    });

    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("contatoForm");

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        emailjs.sendForm("service_zg44nj2", "template_ldtivmp", form)
          .then(() => {
            alert("✅ Mensagem enviada com sucesso!");
            form.reset();
          })
          .catch((error) => {
            alert("❌ Erro ao enviar mensagem: " + error.text);
            console.error("Erro EmailJS:", error);
          });
      });
    });
  </script>
</body>

</html>
